name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  root-tests:
    uses: matt-riley/matt-riley-ci/.github/workflows/ci.yml@bcaf4ae43edf7d26421741424b82c842c83e55ce # v2
    with:
      install: true
      working-directory: .
      lint: false
      test: true
      build: false
      concurrency-suffix: root-tests

  web-build:
    uses: matt-riley/matt-riley-ci/.github/workflows/ci.yml@bcaf4ae43edf7d26421741424b82c842c83e55ce # v2
    with:
      install: true
      working-directory: clients/web
      lint: false
      test: false
      build: true
      concurrency-suffix: web-build
