name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  root-tests:
    uses: matt-riley/matt-riley-ci/.github/workflows/ci.yml@071c2c2bbe410f73126d3cefd0a0b6812b3565f6 # v2
    with:
      install: true
      working-directory: .
      lint: false
      test: true
      build: false
      concurrency-suffix: root-tests

  web-build:
    uses: matt-riley/matt-riley-ci/.github/workflows/ci.yml@071c2c2bbe410f73126d3cefd0a0b6812b3565f6 # v2
    with:
      install: true
      working-directory: clients/web
      lint: false
      test: false
      build: true
      concurrency-suffix: web-build
