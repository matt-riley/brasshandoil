name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  root-tests:
    uses: matt-riley/matt-riley-ci/.github/workflows/ci.yml@0d1d8e7a149a53fcaaca6e128f62e0e3d8fdf293 # v2
    with:
      install: true
      working-directory: .
      lint: false
      test: true
      build: false
      concurrency-suffix: root-tests

  web-build:
    uses: matt-riley/matt-riley-ci/.github/workflows/ci.yml@0d1d8e7a149a53fcaaca6e128f62e0e3d8fdf293 # v2
    with:
      install: true
      working-directory: clients/web
      lint: false
      test: false
      build: true
      concurrency-suffix: web-build
